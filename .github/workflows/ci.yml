name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check copa/ tests/

      - name: Ruff format check
        run: ruff format --check copa/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Copa with test dependencies
        run: pip install -e ".[ollama]" pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: CLI smoke test
        run: |
          copa --version
          copa --help

      - name: Functional smoke test
        run: |
          copa _init
          copa add "echo hello" -d "test command"
          copa list
          copa search hello
          copa stats

      - name: Import smoke test
        run: |
          python -c "
          from copa.scoring import compute_score
          from copa.cli_common import get_db
          from copa.models import Command
          from copa.cli import cli
          print('All imports OK')
          "
